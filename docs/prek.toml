# prek.toml — pre-commit hooks configuration
# Docs: https://prek.j178.dev/configuration/
#
# Run `prek install -t pre-commit -t commit-msg` once to activate the hooks,
# and `prek run --all-files` to lint the whole tree.
#
# This is a DOCUMENTATION repo (markdown only), so the reference config's
# project-specific Shell quality gate (shellcheck) is intentionally omitted —
# there are no shell scripts to lint here.

# Builtin hooks — fast, offline, Rust-native.
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=512"] },
  { id = "detect-private-key" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "no-commit-to-branch", args = ["--branch", "main"] },
]

# Conventional Commits — enforce Conventional Commit message format.
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"] },
]

# Secret / credential leak guard — these docs reference secret material by
# name/role only; nothing may ever be hardcoded or committed.
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
  { id = "gitleaks" },
]
