# prek.toml — pre-commit hooks configuration
# Docs: https://prek.j178.dev/configuration/
#
# Run `prek install -t pre-commit -t commit-msg` once to activate the hooks,
# and `prek run --all-files` to lint the whole tree.

# Builtin hooks — fast, offline, Rust-native.
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=512"] },
  { id = "detect-private-key" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "no-commit-to-branch", args = ["--branch", "main"] },
]

# Conventional Commits — enforce Conventional Commit message format.
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"] },
]

# Secret / credential leak guard — the relay holds no token (it forwards the
# per-request Authorization header) and runtime/ scripts read theirs from
# clawhip.env; nothing may ever be hardcoded, logged, or committed.
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
  { id = "gitleaks" },
]

# Shell quality gate — runtime/ ships the relay's Bash watchdog/helper scripts.
[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.10.0.1"
hooks = [
  # severity=warning drops info-level style nits (e.g. SC2016 on the intentional
  # single-quoted jq programs) while still gating real warnings and errors.
  { id = "shellcheck", args = ["--severity=warning"] },
]
